name: "[Test] @trezor/blockchain-link"

on:
  schedule:
    # Runs at midnight UTC every day at 01:00 AM CET
    - cron: "0 0 * * *"
  pull_request:
    paths:
      - "packages/blockchain-link"
      # dependencies of packages/blockchain-link
      - "packages/utxo-lib"
      - "packages/utils"
      - "docker/docker-blockchain-link-test.sh"
      - ".github/workflows/blockchain-link-test.yml"
      - "yarn.lock"

concurrency:
  group: ${{ github.workflow }}-$${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: |
          echo -e "\nenableScripts: false" >> .yarnrc.yml
          yarn workspaces focus @trezor/blockchain-link

      - name: Build @trezor/blockchain-link
        run: |
          yarn workspace @trezor/blockchain-link build:lib
          yarn workspace @trezor/blockchain-link build:workers

      - name: Run E2E tests
        run: ./docker/docker-blockchain-link-test.sh
